    <body>
        <header>
            <h2>Examples of links</h2>
        </header>

        <main>
            <p>
            <a href="https://www.google.com"><i>Google's homepage</i></a><br> <!-- ALWAYS PUT an "https://" while using href -->
         
            <!-- TO MAKE USERS OPEN LINK IN A NEW TAB, WE'LL USE "target="_blank"" -->
            <a href="https://www.amazon.in" target="_blank"><i>Amazon's homepage</i></a>
            </p>

            <p>
            <!-- We can also link different files of pc -->
            <a href="page2.html" target="_blank"><small><i>page 2</i></small></a><br>
            <a href="helper/page3.html" target="_blank"><small><i>page 3</i></small></a><br>
            <a href="helper/batman.jpg" target="_blank"><small><i>batman</i></small></a><br>
            </p>
