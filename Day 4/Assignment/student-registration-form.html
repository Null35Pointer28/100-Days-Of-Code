<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registartion Form</title>
</head>
<body>
    <header>
        <h2>Student Registartion Form</h2>
    </header>

    <main>
        <form>
            <input type="text" placeholder="First Name">
            <input type="text" placeholder="Last Name"><br>
            Enter Date of Birth:- <input type="date"><br>
            T-shirt size:- 
            <span>
                <input name="Size" type="radio"> S
                <input name="Size" type="radio">M 
                <input name="Size" type="radio"> L
            </span><br>
            Commitment areas:- 
            <span>
                <input type="checkbox">Setup
                <input type="checkbox">Registration Desk
                <input type="checkbox">Clean Up
                <input type="checkbox">Hosting
            </span><br>
            Upload Student ID   <input type="file"><br>
            <p><textarea rows="8" cols="30" placeholder="Why do you want to volunteer?"></textarea></p>
            <input type="submit" value="Submit">
        </form>
    </main>

    <footer>
         &#xA9; Manvendra
    </footer>
</body>
</html>
