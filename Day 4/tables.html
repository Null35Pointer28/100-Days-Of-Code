<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Tables">
        <title>TABLES</title>
    </head>
    <body>
        <table>
             <caption>
                <h2>
                    List of Numbers
                </h2>
            </caption>
            <thead> 
            <tr>
                <th>num1</th>
                <th>num2</th>
                <th>num3</th>
            </tr>
            </thead>
            
            <tbody>
                <tr>
                    <td colspan="2">One</td>
                    <!--  colspan expands the table data till two coloums -->
                    <td>Two</td>
                    <td>Three</td>
                    <td>Three and a half</td>
                </tr>
                <tr>
                    <td>Four</td>
                    <td>Five</td>
                    <td>Six</td>
                </tr>
            </tbody>
        </table>

    </body>
</html>
